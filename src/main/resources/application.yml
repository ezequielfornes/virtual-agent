server:
  port: 8080

spring:
  application:
    name: financial-assistant
  threads:
    virtual:
      enabled: true
  datasource:
    url: jdbc:h2:mem:financial_assistant;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
  h2:
    console:
      enabled: true
      path: /h2-console

# External API configuration
external-api:
  frankfurter:
    base-url: https://api.frankfurter.dev/v1
    connect-timeout-ms: 5000
    read-timeout-ms: 5000
    circuit-breaker:
      failure-threshold: 3
      reset-timeout-ms: 30000

# Application metrics
management:
  endpoints:
    web:
      exposure:
        include: health,info
